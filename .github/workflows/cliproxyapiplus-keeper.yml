name: cliproxyapiplus-keeper

on:
  push:
    branches:
      - master
    paths:
      - 'cliproxyapiplus/Dockerfile.keeper'
      - '.github/workflows/cliproxyapiplus-keeper.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'cliproxyapiplus/Dockerfile.keeper'
      - '.github/workflows/cliproxyapiplus-keeper.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  USAGE_KEEPER_REPOSITORY: https://github.com/Willxup/cpa-usage-keeper.git
  USAGE_KEEPER_TAG: v1.8.2
  USAGE_KEEPER_COMMIT: 465a82e0c40d8e2bb604e5e85701ac94eb7f924c

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone CPA Usage Keeper at pinned tag
        run: |
          git init keeper-build
          git -C keeper-build remote add origin "${USAGE_KEEPER_REPOSITORY}"
          git -C keeper-build fetch --depth=1 origin "+refs/tags/${USAGE_KEEPER_TAG}:refs/tags/${USAGE_KEEPER_TAG}"
          TAG_COMMIT=$(git -C keeper-build rev-parse "refs/tags/${USAGE_KEEPER_TAG}^{commit}")
          test "${TAG_COMMIT}" = "${USAGE_KEEPER_COMMIT}"
          git -C keeper-build checkout --detach "${TAG_COMMIT}"
          test "$(git -C keeper-build rev-parse HEAD)" = "${TAG_COMMIT}"
          cp cliproxyapiplus/Dockerfile.keeper keeper-build/Dockerfile

      - name: Get Usage Keeper version info
        id: info
        run: |
          KEEPER_COMMIT=$(git -C keeper-build rev-parse --short HEAD)
          VERSION="${USAGE_KEEPER_TAG}-${KEEPER_COMMIT}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Upload Usage Keeper source artifact
        uses: actions/upload-artifact@v4
        with:
          name: keeper-source
          path: keeper-build/
          retention-days: 1

  build:
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Download Usage Keeper source artifact
        uses: actions/download-artifact@v4
        with:
          name: keeper-source
          path: keeper-build

      - name: Log in to the GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cliproxyapiplus
          tags: |
            type=raw,value=keeper,enable={{is_default_branch}}
          flavor: |
            suffix=-${{ matrix.arch }},onlatest=true

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./keeper-build
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          provenance: false

  merge:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: github.event_name != 'pull_request'
    steps:
      - name: Log in to the GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cliproxyapiplus
          tags: |
            type=raw,value=keeper,enable={{is_default_branch}}

      - name: Create and push multi-arch manifest
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Creating manifest for: ${tag}"
            docker buildx imagetools create -t ${tag} \
              ${tag}-amd64 \
              ${tag}-arm64 || exit 1
          done

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/cliproxyapiplus:keeper || true
